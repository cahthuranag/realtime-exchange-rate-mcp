startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - allratesApiKey
    properties:
      allratesApiKey:
        type: string
        title: AllRatesToday API key
        description: Your AllRatesToday API key (format art_live_xxxxx). Get one free at https://allratestoday.com/register — no credit card required.
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@allratestoday/mcp-server'],
      env: { ALLRATES_API_KEY: config.allratesApiKey }
    })
  exampleConfig:
    allratesApiKey: art_live_xxxxxxxxxxxxxxxxxxxxxxxx
